<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Giriş Yap</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>


</head>
<body class= "bg-base-200 min-h-screen flex flex-col items-center">

<header class="bg-neutral text-white w-full p-4 text-center text-2xl font-bold">
My Blog
</header>

<div class="card w-96 bg-base-100 shadow-xl">
<div class="card-body">

<h2 class="card-title">Giriş Yap</h2>

<input id="email" type="email" placeholder="Email" class="input input-bordered">
<input id="password" type="password" placeholder="Password" class="input input-bordered">

<button id="loginBtn" class="btn btn-primary">Giriş Yap</button>

<a href="register.html" class="link">Kayıt Ol</a>

</div>
</div>

<script>

const API_URL = "https://api.zaferayan.com";

document.getElementById("loginBtn").addEventListener("click", async () => {

try {

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { data } = await axios.post(API_URL + "/auth/login", {
email,
password
});

localStorage.setItem("token", data.token);
localStorage.setItem("user", JSON.stringify(data.user));

window.location.href = "articles.html";

} catch (error) {
alert("Giriş başarısız");
}

});

</script>

</body>
</html>
