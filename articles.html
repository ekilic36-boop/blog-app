<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Makaleler</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>

</head>
<body class="bg-base-200 min-h-screen">

<div class="navbar bg-base-100 shadow">
<div class="flex-1">
<a class="btn btn-ghost text-xl">Blog App</a>
</div>

<div class="flex-none gap-2">

<span id="username" class="font-semibold"></span>

<a href="create-post.html" class="btn btn-primary btn-sm">
Yeni Makale
</a>

<button onclick="handleLogout()" class="btn btn-error btn-sm">
Çıkış
</button>

</div>
</div>

<div id="articles-container"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-6">
</div>

<script>

const API_URL = "https://api.zaferayan.com";

const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));

if(!token){
window.location.href = "login.html";
}

document.getElementById("username").innerText =
"👤 " + user.username;

const handleLogout = () => {
localStorage.clear();
window.location.href = "login.html";
};

const deletePost = async (id) => {

if(!confirm("Silmek istiyor musun?")) return;

await axios.delete(API_URL + "/posts/" + id , {
headers:{
Authorization:`Bearer ${token}`
}
});

loadArticles();
};

const loadArticles = async () => {

const { data: articles } = await axios.get(API_URL + "/posts");

const html = articles.map(({ id , title, body, author, category }) => `

<div class="card bg-base-100 shadow">

<div class="card-body">

<h2 class="card-title">${title}</h2>

<p>${body}</p>

<div class="flex justify-between items-center mt-3">

<span class="text-sm">
✍ ${author?.username || "Bilinmeyen"}
</span>

<div class="badge badge-primary">
${category}
</div>

</div>

<div class="card-actions justify-end mt-3">

<button onclick="editPost('${id}')"
class="btn btn-sm btn-warning">
Düzenle
</button>

<button onclick="deletePost('${id}')"
class="btn btn-sm btn-error">
Sil
</button>

</div>

</div>

</div>

`).join("");

document.getElementById("articles-container").innerHTML = html;

};

const editPost = (id)=>{
window.location.href = "create-post.html?id="+id;
}

loadArticles();

</script>

</body>
</html>
